<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WavePad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --border: #2a2d3e;
      --accent: #7c6af7;
      --accent2: #4fd1c5;
      --text: #e2e8f0;
      --muted: #718096;
      --green: #48bb78;
      --red: #fc8181;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 0;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: 0.02em; }
    header h1 span { color: var(--accent); }

    .exp-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }
    .exp-btn:hover { opacity: 0.85; }

    #ws-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    #ws-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    #ws-dot.connected { background: var(--green); }

    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      padding: 24px 32px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .panel-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* QR code panel */
    #qr-img {
      width: 100%;
      border-radius: 8px;
      display: block;
      image-rendering: pixelated;
    }
    #qr-url {
      margin-top: 10px;
      font-size: 0.72rem;
      color: var(--muted);
      word-break: break-all;
      text-align: center;
    }
    .conn-count {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(124,106,247,0.08);
      border: 1px solid var(--border);
      text-align: center;
    }
    .conn-count strong { color: var(--accent); font-size: 1.5rem; display: block; font-weight: 800; }
    .conn-count span   { font-size: 0.72rem; color: var(--muted); }

    /* Players grid */
    .right-area { min-width: 0; }
    #players-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }
    .empty-state {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 60px 20px;
      color: var(--muted);
      border: 1px dashed var(--border);
      border-radius: 14px;
      text-align: center;
    }
    .empty-state strong { color: var(--text); font-size: 1.1rem; }

    .player-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .player-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .p-chip {
      padding: 3px 12px;
      border-radius: 16px;
      font-size: 0.85rem;
      font-weight: 700;
      border: 2px solid;
    }
    .p-hz { font-size: 0.7rem; color: var(--muted); }

    .p-tilt-wrap { display: flex; justify-content: center; }
    .p-tilt-canvas {
      width: 120px; height: 120px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
    }

    .p-sensors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .p-sensor {
      background: var(--bg);
      border-radius: 8px;
      padding: 6px 8px;
    }
    .p-sensor .ps-lbl {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .p-sensor .ps-vals {
      display: flex;
      gap: 6px;
      font-size: 0.8rem;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }
    .ax { color: #fc8181; }
    .ay { color: #68d391; }
    .az { color: #63b3ed; }
  </style>
</head>
<body>

<header>
  <h1>Wave<span>Pad</span></h1>
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/experiences" class="exp-btn">&#9654; Experiences</a>
    <div id="ws-status">
      <div id="ws-dot"></div>
      <span id="ws-label">Connecting…</span>
    </div>
  </div>
</header>

<main>
  <!-- Left: QR -->
  <div>
    <div class="panel">
      <div class="panel-title">Scan to Connect</div>
      <img id="qr-img" src="/qr.png" alt="QR Code" />
      <div id="qr-url">Loading…</div>
      <div class="conn-count">
        <strong id="conn-num">0</strong>
        <span>phones connected</span>
      </div>
    </div>
  </div>

  <!-- Right: per-player cards -->
  <div class="right-area">
    <div id="players-grid">
      <div class="empty-state" id="empty-state">
        <strong>Waiting for players…</strong>
        <span>Scan the QR code with a phone to start</span>
      </div>
    </div>
  </div>
</main>

<script>
  const host = location.host;
  let ws;

  const PLAYER_COLORS = ['#7c6af7','#f56565','#4299e1','#48bb78','#ed8936','#9f7aea'];
  // players[id] = { color, canvas, ctx, beta, gamma, lastSecTs, fpsCount, fps }
  const players = {};

  fetch('/api/status')
    .then(r => r.json())
    .then(d => { document.getElementById('qr-url').textContent = `https://${d.local_ip}:8000/mobile`; });

  function playerColor(id) {
    const n = parseInt(id.slice(1)) || 1;
    return PLAYER_COLORS[(n - 1) % PLAYER_COLORS.length];
  }

  function fmt(v) { return (v == null) ? '—' : v.toFixed(2); }

  function addPlayerCard(id) {
    if (players[id]) return;
    const color = playerColor(id);
    const r = parseInt(color.slice(1,3),16);
    const g = parseInt(color.slice(3,5),16);
    const b = parseInt(color.slice(5,7),16);

    document.getElementById('empty-state')?.remove();

    const card = document.createElement('div');
    card.className = 'player-card';
    card.id = `card-${id}`;
    card.style.borderColor = color;
    card.innerHTML = `
      <div class="player-card-header">
        <div class="p-chip" style="color:${color};border-color:${color};background:rgba(${r},${g},${b},0.14)">${id}</div>
        <span class="p-hz" id="hz-${id}">— Hz</span>
      </div>
      <div class="p-tilt-wrap">
        <canvas class="p-tilt-canvas" id="tilt-${id}" width="120" height="120"></canvas>
      </div>
      <div class="p-sensors">
        <div class="p-sensor">
          <div class="ps-lbl">Accel (m/s²)</div>
          <div class="ps-vals">
            <span class="ax" id="${id}-ax">—</span>
            <span class="ay" id="${id}-ay">—</span>
            <span class="az" id="${id}-az">—</span>
          </div>
        </div>
        <div class="p-sensor">
          <div class="ps-lbl">Tilt β / γ</div>
          <div class="ps-vals">
            <span class="ay" id="${id}-ob">—</span>
            <span class="az" id="${id}-og">—</span>
          </div>
        </div>
      </div>`;

    document.getElementById('players-grid').appendChild(card);
    const cvs = document.getElementById(`tilt-${id}`);
    const ctx = cvs.getContext('2d');
    players[id] = { color, r, g, b, canvas: cvs, ctx, beta: 0, gamma: 0, lastSecTs: performance.now(), fpsCount: 0, fps: 0 };
    drawTilt(id);
    updateConnCount();
  }

  function removePlayerCard(id) {
    delete players[id];
    document.getElementById(`card-${id}`)?.remove();
    if (Object.keys(players).length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.id = 'empty-state';
      empty.innerHTML = '<strong>Waiting for players…</strong><span>Scan the QR code with a phone to start</span>';
      document.getElementById('players-grid').appendChild(empty);
    }
    updateConnCount();
  }

  function updateConnCount() {
    document.getElementById('conn-num').textContent = Object.keys(players).length;
  }

  function drawTilt(id) {
    const p = players[id];
    if (!p) return;
    const { ctx, canvas, beta, gamma, color, r, g, b } = p;
    const W = canvas.width, H = canvas.height;
    const cx = W / 2, cy = H / 2, R = W / 2 - 3;

    ctx.clearRect(0, 0, W, H);

    ctx.beginPath(); ctx.arc(cx, cy, R, 0, Math.PI * 2);
    ctx.fillStyle = '#0f1117'; ctx.fill();
    ctx.strokeStyle = '#2a2d3e'; ctx.lineWidth = 1.5; ctx.stroke();

    ctx.strokeStyle = '#2a2d3e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx - R, cy); ctx.lineTo(cx + R, cy); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, cy - R); ctx.lineTo(cx, cy + R); ctx.stroke();

    const gx = Math.max(-90, Math.min(90, gamma)) / 90 * (R - 10);
    const gy = Math.max(-90, Math.min(90, beta))  / 90 * (R - 10);

    const grad = ctx.createRadialGradient(cx+gx, cy+gy, 0, cx+gx, cy+gy, 16);
    grad.addColorStop(0, `rgba(${r},${g},${b},0.55)`);
    grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath(); ctx.arc(cx+gx, cy+gy, 16, 0, Math.PI * 2);
    ctx.fillStyle = grad; ctx.fill();

    ctx.beginPath(); ctx.arc(cx+gx, cy+gy, 8, 0, Math.PI * 2);
    ctx.fillStyle = color; ctx.fill();
  }

  function tickFps(id) {
    const p = players[id];
    if (!p) return;
    p.fpsCount++;
    const now = performance.now();
    if (now - p.lastSecTs >= 1000) {
      p.fps = p.fpsCount;
      p.fpsCount = 0;
      p.lastSecTs = now;
      const el = document.getElementById(`hz-${id}`);
      if (el) el.textContent = p.fps + ' Hz';
    }
  }

  function handleMessage(msg) {
    if (msg.type === 'status') {
      // Full roster snapshot sent on WS connect (or any status update with players list)
      if (Array.isArray(msg.players)) {
        msg.players.forEach(id => addPlayerCard(id));
      }
      if (msg.newPlayer)  addPlayerCard(msg.newPlayer);
      if (msg.leftPlayer) removePlayerCard(msg.leftPlayer);
      return;
    }
    if (msg.type !== 'motion') return;
    const id = msg.playerId;
    if (!id || !players[id]) return;

    const p = players[id];
    const { acceleration: acc, orientation: ori } = msg;

    p.beta  = ori?.beta  ?? 0;
    p.gamma = ori?.gamma ?? 0;

    document.getElementById(`${id}-ax`).textContent = fmt(acc?.x);
    document.getElementById(`${id}-ay`).textContent = fmt(acc?.y);
    document.getElementById(`${id}-az`).textContent = fmt(acc?.z);
    document.getElementById(`${id}-ob`).textContent = fmt(p.beta)  + '°';
    document.getElementById(`${id}-og`).textContent = fmt(p.gamma) + '°';

    drawTilt(id);
    tickFps(id);
  }

  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${host}/ws/laptop`);
    ws.onopen = () => {
      document.getElementById('ws-dot').classList.add('connected');
      document.getElementById('ws-label').textContent = 'Connected';
    };
    ws.onmessage = (e) => { try { handleMessage(JSON.parse(e.data)); } catch {} };
    ws.onclose = () => {
      document.getElementById('ws-dot').classList.remove('connected');
      document.getElementById('ws-label').textContent = 'Reconnecting…';
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
  }

  connect();
</script>
</body>
</html>
