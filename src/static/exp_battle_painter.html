<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Battle Painter — WavePad</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0f1117;
      --surface: #1a1d2e;
      --border:  #2a2d3e;
      --accent:  #7c6af7;
      --text:    #e2e8f0;
      --muted:   #718096;
      --green:   #48bb78;
      --red:     #fc8181;
      --p1:      #7c6af7;
      --p2:      #f56565;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1rem; font-weight: 700; white-space: nowrap; }
    header h1 span { color: var(--accent); }

    .back-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.82rem;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .back-btn:hover { color: var(--text); }

    #hud {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.82rem;
      flex-wrap: wrap;
    }
    #hud span  { color: var(--muted); }
    #hud strong { font-variant-numeric: tabular-nums; }

    #ws-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #ws-dot.ok { background: var(--green); }

    .score-bar-bg {
      width: 88px;
      height: 7px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-shrink: 0;
    }
    .score-seg { height: 100%; transition: width 0.1s linear; }

    #timer-val { font-variant-numeric: tabular-nums; }
    #timer-val.urgent { color: var(--red); }

    #game-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: var(--bg);
    }
    canvas { display: block; }

    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 7px 20px;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    footer kbd {
      background: var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 0.66rem;
    }

    /* ── Overlay ─────────────────────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(15,17,23,0.92);
      backdrop-filter: blur(8px);
      z-index: 30;
    }
    #overlay.hidden { display: none; }

    #overlay-h   { font-size: 2.4rem; font-weight: 800; text-align: center; }
    #overlay-sub { color: var(--muted); font-size: 0.9rem; text-align: center; line-height: 1.7; }

    .big-scores {
      display: flex;
      gap: 40px;
      align-items: flex-end;
    }
    .big-score {
      text-align: center;
      font-size: 2.8rem;
      font-weight: 800;
    }
    .big-score .lbl {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
      margin-top: 2px;
    }

    #play-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 32px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    #play-btn:hover { opacity: 0.85; }

    #countdown {
      font-size: 6rem;
      font-weight: 900;
      line-height: 1;
      min-height: 1.1em;
      text-align: center;
      transition: color 0.25s;
    }

    @keyframes pulse-score {
      0%, 100% { transform: scale(1); }
      45%       { transform: scale(1.5); }
    }
    .score-pulse { animation: pulse-score 0.45s ease; }

    #result-bg {
      position: absolute; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(10px) brightness(0.28);
      opacity: 0; transition: opacity 0.7s;
      pointer-events: none; border-radius: inherit;
    }

    .controls-hint {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 0.78rem;
      color: var(--muted);
      line-height: 1.9;
      text-align: center;
    }
    .controls-hint b { color: var(--text); }

    /* ── Two-panel lobby ─────────────────────────────────────────── */
    #ov-intro {
      display: grid;
      grid-template-columns: 200px 1fr;
      align-items: stretch;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      width: min(660px, 94vw);
      max-height: 82vh;
    }

    /* Left column — connected players */
    #lobby-panel {
      border-right: 1px solid var(--border);
      padding: 20px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(0,0,0,0.18);
      overflow-y: auto;
    }
    .panel-title {
      font-size: 0.58rem; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 4px;
    }
    .player-token {
      display: flex; align-items: center; gap: 9px;
      padding: 7px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      cursor: pointer; transition: all 0.12s; width: 100%;
      font-size: 0.82rem; font-weight: 600; color: var(--muted);
      text-align: left;
    }
    .player-token.on    { background: rgba(255,255,255,0.06); color: var(--text); }
    .player-token .pt-dot {
      width: 9px; height: 9px; border-radius: 50%;
      border: 2px solid currentColor; flex-shrink: 0;
    }
    .player-token.on .pt-dot { background: currentColor; }
    .player-limit-note {
      font-size: 0.68rem; color: var(--muted);
      font-style: italic; margin-top: auto; padding-top: 8px;
    }
    .no-phones { font-size: 0.78rem; color: var(--muted); font-style: italic; }

    /* Right column — settings + start */
    #settings-col {
      padding: 22px 20px;
      display: flex; flex-direction: column; gap: 16px;
      overflow-y: auto;
    }
    #settings-col h2 { font-size: 1.5rem; font-weight: 800; }

    #ov-result { display: none; flex-direction: column; align-items: center; gap: 16px; }
    #ov-result h2 { font-size: 2.2rem; font-weight: 800; text-align: center; }
    #ov-result p  { color: var(--muted); font-size: 0.9rem; text-align: center; }

    #settings-panel {
      display: flex; flex-direction: column; gap: 13px;
    }
    .cfg-row   { display: flex; flex-direction: column; gap: 6px; }
    .cfg-lbl   {
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--muted);
    }
    .pill-row  { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .pill {
      padding: 5px 13px; border-radius: 20px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 0.8rem; cursor: pointer;
      transition: all 0.12s;
    }
    .pill:hover { border-color: var(--accent); color: var(--text); }
    .pill.on    { background: var(--accent); border-color: var(--accent); color: #fff; }

    .replay-btn {
      background: transparent; color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 26px; font-size: 0.88rem; font-weight: 600;
      cursor: pointer; transition: border-color 0.15s;
    }
    .replay-btn:hover { border-color: var(--accent); }
  </style>
</head>
<body>

<header>
  <h1>&#127912; Battle <span>Painter</span></h1>
  <div id="hud">
    <div id="ws-dot"></div>
    <span>&#9201; <strong id="timer-val">60</strong>s</span>
    <div id="hud-scores" style="display:contents"></div>
    <div class="score-bar-bg"><div id="score-bar-inner" style="width:100%;display:flex;height:100%"></div></div>
  </div>
  <a href="/experiences" class="back-btn">&#8592; Experiences</a>
</header>

<div id="game-wrap">
  <canvas id="c"></canvas>
</div>

<footer>
  &#128241; Hold phone flat &middot; tilt in any direction to slide your brush &middot; most paint after 60s wins
</footer>

<!-- ── Overlay ──────────────────────────────────────────────────────────────── -->
<div id="overlay">

  <!-- LOBBY / SETTINGS -->
  <div id="ov-intro">

    <!-- LEFT: Players lobby -->
    <div id="lobby-panel">
      <div class="panel-title">&#128101; Players</div>
      <div id="player-select"><!-- built by JS --></div>
      <div class="player-limit-note" id="player-limit-note">up to 6 players</div>
    </div>

    <!-- RIGHT: Settings + start -->
    <div id="settings-col">
      <h2>&#127912; Battle Painter</h2>

      <div id="settings-panel">

        <div class="cfg-row" id="ai-diff-row">
          <div class="cfg-lbl">&#129302; AI Difficulty</div>
          <div class="pill-row">
            <button class="pill"    data-cfg="aiDiff" data-val="easy">Easy</button>
            <button class="pill on" data-cfg="aiDiff" data-val="normal">Normal</button>
            <button class="pill"    data-cfg="aiDiff" data-val="hard">Hard</button>
          </div>
        </div>

        <div class="cfg-row">
          <div class="cfg-lbl">&#9201; Game Duration</div>
          <div class="pill-row">
            <button class="pill"    data-cfg="gameSecs" data-val="30">30 s</button>
            <button class="pill on" data-cfg="gameSecs" data-val="60">60 s</button>
            <button class="pill"    data-cfg="gameSecs" data-val="90">90 s</button>
            <button class="pill"    data-cfg="gameSecs" data-val="120">2 min</button>
          </div>
        </div>

        <div class="cfg-row">
          <div class="cfg-lbl">&#128168; Brush Speed</div>
          <div class="pill-row">
            <button class="pill"    data-cfg="accelMult" data-val="0.55">Slow</button>
            <button class="pill on" data-cfg="accelMult" data-val="1.0">Normal</button>
            <button class="pill"    data-cfg="accelMult" data-val="1.7">Fast</button>
            <button class="pill"    data-cfg="accelMult" data-val="2.5">Turbo</button>
          </div>
        </div>

      </div>

      <button id="play-btn" onclick="startGame()">&#9654; Start Game</button>
    </div>

  </div>

  <!-- COUNTDOWN -->
  <div id="countdown" style="display:none"></div>

  <!-- RESULTS -->
  <div id="ov-result">
    <div id="result-bg"></div>
    <h2 id="overlay-h"></h2>
    <p  id="overlay-sub"></p>
    <div id="ov-scores" class="big-scores" style="flex-wrap:wrap;gap:12px"><!-- built by endGame() --></div>
    <button class="replay-btn" onclick="showLobby()">&#8635; Play Again</button>
  </div>

</div>

<script>

// ─── Constants ────────────────────────────────────────────────────────────────
const COLS      = 64;
const ROWS      = 40;
const GAME_SECS = 60;
const BRUSH_R   = 1.75;   // paint radius (cells)
const ACCEL     = 0.014;  // cells / frame²  per unit tilt
const FRICTION  = 0.92;   // velocity kept each frame
const BOUNCE    = 0.45;   // velocity kept on border bounce
const AI_ACCEL  = 0.014;  // AI acceleration

// ─── Live config (populated by settings panel) ────────────────────────────────────
const cfg = {
  gameSecs:  60,
  accelMult: 1.0,
  aiDiff:    'normal',  // 'easy' | 'normal' | 'hard'
};

// ─── Connected players roster ──────────────────────────────────────────────────
const connectedPlayers = new Set();
const PLAYER_COLORS    = ['#7c6af7','#f56565','#4299e1','#48bb78','#ed8936','#9f7aea'];

function phoneColor(id) {
  const n = parseInt(id.slice(1)) || 1;
  return PLAYER_COLORS[(n - 1) % PLAYER_COLORS.length];
}

// Battle Painter supports up to 6 players
const MAX_PLAYERS = 6;

// Which tokens are active — 'ai', or a playerId (no keyboard)
const selectedTokens = new Set(['ai']);

function buildPlayerSelect() {
  const el = document.getElementById('player-select');
  if (!el) return;
  el.innerHTML = '';

  const tokens = [
    ...[...connectedPlayers].map(id => ({ id, label: id, type: 'phone' })),
    { id: 'ai', label: '\uD83E\uDD16 AI', type: 'ai' },
  ];

  tokens.forEach(tok => {
    const on  = selectedTokens.has(tok.id);
    const btn = document.createElement('button');
    btn.className = 'player-token' + (on ? ' on' : '');
    const dot = document.createElement('span');
    dot.className = 'pt-dot';
    const c = tok.type === 'phone' ? phoneColor(tok.id) : 'var(--muted)';
    btn.style.color = c;
    btn.appendChild(dot);
    const lbl = document.createElement('span');
    lbl.textContent = tok.label;
    btn.appendChild(lbl);
    btn.onclick = () => {
      if (selectedTokens.has(tok.id)) {
        if (selectedTokens.size > 1) selectedTokens.delete(tok.id);
      } else if (selectedTokens.size < MAX_PLAYERS) {
        selectedTokens.add(tok.id);
      }
      buildPlayerSelect();
      const aiRow = document.getElementById('ai-diff-row');
      if (aiRow) aiRow.style.display = selectedTokens.has('ai') ? '' : 'none';
    };
    el.appendChild(btn);
  });

  if (tokens.length === 0) {
    const p = document.createElement('p');
    p.className = 'no-phones';
    p.textContent = 'No phones connected yet…';
    el.appendChild(p);
  }

  const note = document.getElementById('player-limit-note');
  if (note) note.textContent = `${selectedTokens.size} / ${MAX_PLAYERS} selected`;
}

function updatePlayerRoster() {
  // Auto-select first phone that connects if no phone is selected yet
  const hasPhone = [...connectedPlayers].some(id => selectedTokens.has(id));
  if (!hasPhone && connectedPlayers.size > 0) {
    selectedTokens.add([...connectedPlayers][0]);
  }
  buildPlayerSelect();
}

// Wire static pill buttons (gameSecs, accelMult, aiDiff)
document.querySelectorAll('.pill[data-cfg]').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.cfg;
    const raw = btn.dataset.val;
    cfg[key] = isNaN(raw) ? raw : parseFloat(raw);
    document.querySelectorAll(`.pill[data-cfg="${key}"]`)
      .forEach(p => p.classList.toggle('on', p === btn));
  });
});

buildPlayerSelect();

// ─── Canvas ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('game-wrap');
let cW, cH, cellW, cellH;

function resize() {
  const scale = Math.min((wrap.clientWidth - 4) / COLS, (wrap.clientHeight - 4) / ROWS);
  cellW = scale; cellH = scale;
  cW = Math.floor(cellW * COLS);
  cH = Math.floor(cellH * ROWS);
  canvas.width = cW; canvas.height = cH;
}
window.addEventListener('resize', resize);

// ─── Grid  (0 = unpainted; 1…N = player owner index) ───────────────────────
 const grid      = new Uint8Array(COLS * ROWS);
const freshness = new Uint8Array(COLS * ROWS); // 0–30, decays each frame

function initGrid() { grid.fill(0); freshness.fill(0); }

function paintAt(cx, cy, radius, owner) {
  const c0 = Math.max(0, Math.floor(cx - radius));
  const c1 = Math.min(COLS - 1, Math.ceil(cx + radius));
  const r0 = Math.max(0, Math.floor(cy - radius));
  const r1 = Math.min(ROWS - 1, Math.ceil(cy + radius));
  const r2 = radius * radius;
  for (let row = r0; row <= r1; row++)
    for (let col = c0; col <= c1; col++) {
      const dx = col + 0.5 - cx, dy = row + 0.5 - cy;
      if (dx * dx + dy * dy <= r2) {
        const idx = row * COLS + col;
        if (grid[idx] !== owner) freshness[idx] = 28; // fresh burst on claim
        grid[idx] = owner;
      }
    }
}

function tickFreshness() {
  for (let i = 0; i < freshness.length; i++) {
    if (freshness[i] > 0) freshness[i]--;
  }
}

// ─── Ink splatter particles ─────────────────────────────────────────────────
const particles = [];

function spawnSplat(bx, by, color, spdN) {
  const n = 2 + (Math.random() < spdN ? 2 : 0);
  for (let i = 0; i < n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd   = (0.4 + Math.random() * 0.9) * (0.6 + spdN * 1.2);
    particles.push({
      x: bx * cellW, y: by * cellH,
      vx: Math.cos(angle) * spd * cellW * 0.05,
      vy: Math.sin(angle) * spd * cellH * 0.05,
      r:  (1.2 + Math.random() * 2.2) * cellW * 0.055,
      color, life: 1,
      decay: 0.055 + Math.random() * 0.055,
    });
  }
}

function tickParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x   += p.vx;  p.y   += p.vy;
    p.vx  *= 0.84;  p.vy  *= 0.84;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life * 0.88;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * Math.max(0.1, p.life), 0, Math.PI * 2);
    ctx.fillStyle = p.color;
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function getScores() {
  const counts = new Int32Array(gamePlayers.length);
  for (let i = 0; i < grid.length; i++) {
    const v = grid[i];
    if (v >= 1 && v <= gamePlayers.length) counts[v - 1]++;
  }
  return { counts, total: COLS * ROWS };
}

// N-player brushes; populated in beginGame()
let gamePlayers = [];

// Starting positions for up to 6 players
const STARTS = [
  { col: 4,           row: 4 },
  { col: COLS - 5,    row: ROWS - 5 },
  { col: COLS - 5,    row: 4 },
  { col: 4,           row: ROWS - 5 },
  { col: (COLS/2)|0,  row: 3 },
  { col: (COLS/2)|0,  row: ROWS - 4 },
];

function makeBrush(tx, ty) { return { tx, ty, vx: 0, vy: 0, trail: [] }; }

function moveBrush(brush, ax, ay, owner) {
  brush.trail.push({ tx: brush.tx, ty: brush.ty });
  if (brush.trail.length > 14) brush.trail.shift();

  brush.vx = brush.vx * FRICTION + ax;
  brush.vy = brush.vy * FRICTION + ay;

  let nx = brush.tx + brush.vx, ny = brush.ty + brush.vy;

  if (nx < BRUSH_R)        { nx = BRUSH_R;        brush.vx =  Math.abs(brush.vx) * BOUNCE; }
  if (nx > COLS - BRUSH_R) { nx = COLS - BRUSH_R; brush.vx = -Math.abs(brush.vx) * BOUNCE; }
  if (ny < BRUSH_R)        { ny = BRUSH_R;        brush.vy =  Math.abs(brush.vy) * BOUNCE; }
  if (ny > ROWS - BRUSH_R) { ny = ROWS - BRUSH_R; brush.vy = -Math.abs(brush.vy) * BOUNCE; }

  brush.tx = nx; brush.ty = ny;

  // Speed-scaled paint radius: fast movement = wider, bolder strokes
  const spd   = Math.hypot(brush.vx, brush.vy);
  const spdN  = Math.min(1, spd / 0.12);
  const paintR = BRUSH_R * (1 + spdN * 0.6);
  paintAt(brush.tx, brush.ty, paintR, owner);
  return spdN;
}

// ─── AI ───────────────────────────────────────────────────────────────────────
// Picks a target cell for an AI player, biased toward enemy/unpainted cells
function pickAITarget(brush, ownerIdx) {
  const aggr = cfg.aiDiff === 'hard' ? 2.5 : cfg.aiDiff === 'easy' ? 0.4 : 1.0;
  let best = { col: (COLS * 0.5) | 0, row: (ROWS * 0.5) | 0, score: -Infinity };
  for (let k = 0; k < 45; k++) {
    const col = (Math.random() * COLS) | 0;
    const row = (Math.random() * ROWS) | 0;
    const v     = grid[row * COLS + col];
    const isEnemy = v !== 0 && v !== ownerIdx;
    const bonus = v === 0 ? 14 : isEnemy ? 7 * aggr : 0;
    const dist  = Math.hypot(col - brush.tx, row - brush.ty);
    const score = bonus * 3 + dist * 0.5;
    if (score > best.score) best = { col, row, score };
  }
  return best;
}

// Advances one AI player's pathfinding + movement
function stepAI(gp, ownerIdx) {
  gp.aiTimer--;
  if (gp.aiTimer <= 0 || Math.hypot(gp.aiTarget.col - gp.brush.tx, gp.aiTarget.row - gp.brush.ty) < 2.5) {
    const t = pickAITarget(gp.brush, ownerIdx);
    gp.aiTarget.col = t.col; gp.aiTarget.row = t.row;
    gp.aiTimer = 35 + ((Math.random() * 55) | 0);
  }
  const dx = gp.aiTarget.col - gp.brush.tx, dy = gp.aiTarget.row - gp.brush.ty;
  const d  = Math.hypot(dx, dy);
  const diffMult = cfg.aiDiff === 'hard' ? 1.6 : cfg.aiDiff === 'easy' ? 0.55 : 1.0;
  const aAI = AI_ACCEL * cfg.accelMult * diffMult;
  moveBrush(gp.brush, d > 0 ? dx / d * aAI : 0, d > 0 ? dy / d * aAI : 0, ownerIdx);
}

// Per-phone tilt state — keyed by playerId
const phoneState = {};

// ─── Drawing ──────────────────────────────────────────────────────────────────
function draw() {
  ctx.fillStyle = '#0f1117';
  ctx.fillRect(0, 0, cW, cH);

  // Pre-compute cell fill colours for each player
  const cellColors = gamePlayers.map(gp => {
    const r = parseInt(gp.color.slice(1,3),16);
    const g = parseInt(gp.color.slice(3,5),16);
    const b = parseInt(gp.color.slice(5,7),16);
    return `rgba(${r},${g},${b},0.55)`;
  });

  // Painted cells
  for (let row = 0; row < ROWS; row++)
    for (let col = 0; col < COLS; col++) {
      const v = grid[row * COLS + col];
      if (v === 0 || v > gamePlayers.length) continue;
      ctx.fillStyle = cellColors[v - 1];
      ctx.fillRect(col * cellW, row * cellH, cellW, cellH);
    }

  // Subtle grid
  ctx.strokeStyle = 'rgba(42,45,62,0.15)';
  ctx.lineWidth   = 0.5;
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*cellW, 0); ctx.lineTo(c*cellW, cH); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r*cellH); ctx.lineTo(cW, r*cellH); ctx.stroke(); }

  gamePlayers.forEach(gp => drawBrush(gp.brush, gp.color, gp.label));
}

function drawBrush(brush, col, label) {
  const px   = brush.tx * cellW, py = brush.ty * cellH;
  const r    = BRUSH_R * cellW;
  const vx   = brush.vx, vy = brush.vy;
  const spd  = Math.hypot(vx, vy);
  const spdN = Math.min(1, spd / 0.12);   // 0–1 normalised

  // ── Comet tail: tapered connected stroke, oldest → newest ──────────────────
  const pts = [...brush.trail, { tx: brush.tx, ty: brush.ty }];
  if (pts.length > 1) {
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i = 1; i < pts.length; i++) {
      const frac = i / pts.length;   // 0 at oldest end → 1 at brush head
      const x0 = pts[i-1].tx * cellW,  y0 = pts[i-1].ty * cellH;
      const x1 = pts[i].tx   * cellW,  y1 = pts[i].ty   * cellH;
      ctx.globalAlpha = frac * 0.5;
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = col;
      ctx.lineWidth   = r * (0.12 + 1.9 * frac);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // ── Layered speed glow ───────────────────────────────────────────────────
  if (spdN > 0.04) {
    ctx.globalAlpha = spdN * 0.38;
    ctx.beginPath();
    ctx.arc(px, py, r * (1.6 + spdN * 1.0), 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.globalAlpha = spdN * 0.16;
    ctx.beginPath();
    ctx.arc(px, py, r * (2.4 + spdN * 2.0), 0, Math.PI * 2);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── Squash & stretch blob ───────────────────────────────────────────────
  ctx.save();
  ctx.translate(px, py);
  if (spd > 0.008) {
    ctx.rotate(Math.atan2(vy, vx));
    ctx.scale(1 + spdN * 0.5, 1 - spdN * 0.25);
  }

  // Shadow
  ctx.beginPath();
  ctx.arc(2, 3, r, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.32)';
  ctx.fill();

  // Body — radial gradient paint blob
  const grad = ctx.createRadialGradient(-r*0.32, -r*0.34, r*0.04, 0, 0, r);
  grad.addColorStop(0,   lighten(col, 65));
  grad.addColorStop(0.5, col);
  grad.addColorStop(1,   darken(col, 35));
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Specular highlight
  ctx.beginPath();
  ctx.arc(-r*0.27, -r*0.27, r*0.26, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.44)';
  ctx.fill();

  ctx.restore();

  // Player / AI label (drawn after restore — stays upright)
  if (label) {
    ctx.globalAlpha = 0.94;
    ctx.font = `bold ${Math.max(7, r * 0.85)}px sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#fff';
    ctx.fillText(label, px, py);
    ctx.globalAlpha  = 1;
  }
}

function lighten(hex, amt) {
  return `rgb(${Math.min(255, parseInt(hex.slice(1,3),16)+amt)},` +
         `${Math.min(255, parseInt(hex.slice(3,5),16)+amt)},` +
         `${Math.min(255, parseInt(hex.slice(5,7),16)+amt)})`;
}
function darken(hex, amt) { return lighten(hex, -amt); }

// ─── HUD ──────────────────────────────────────────────────────────────────────
let lastLeaderIdx = -1;

function updateHUD(remaining) {
  const tv = document.getElementById('timer-val');
  const rt = Math.ceil(remaining);
  tv.textContent = rt;
  tv.classList.toggle('urgent', rt <= 10);
  if (gamePlayers.length === 0) return;
  const { counts, total } = getScores();

  // Detect lead change and pulse the new leader's score
  const leaderIdx = counts.reduce((best, c, i) => c > counts[best] ? i : best, 0);
  if (leaderIdx !== lastLeaderIdx && counts[leaderIdx] > 0) {
    const el = document.getElementById(`hud-score-${leaderIdx}`);
    if (el) { el.classList.remove('score-pulse'); void el.offsetWidth; el.classList.add('score-pulse'); }
    lastLeaderIdx = leaderIdx;
  }

  gamePlayers.forEach((gp, i) => {
    const pct = counts[i] / total * 100;
    const scoreEl = document.getElementById(`hud-score-${i}`);
    const barEl   = document.getElementById(`bar-seg-${i}`);
    if (scoreEl) scoreEl.textContent = pct.toFixed(1) + '%';
    if (barEl)   barEl.style.width   = pct + '%';
  });
}

// ─── Gameplay music ───────────────────────────────────────────────────────────
const bgMusic = new Audio('/sounds/battle_painter_gameplay_music.mp3');
bgMusic.loop   = true;
bgMusic.volume = 0.55;

function musicPlay()  { bgMusic.currentTime = 0; bgMusic.play().catch(() => {}); }
function musicStop()  { bgMusic.pause(); bgMusic.currentTime = 0; }

// ─── Game loop ────────────────────────────────────────────────────────────────
let gameRunning = false, gameStartTime = 0, animId = null;

function gameLoop(ts) {
  if (!gameRunning) return;
  const remaining = Math.max(0, cfg.gameSecs - (ts - gameStartTime) / 1000);

  gamePlayers.forEach((gp, i) => {
    const ownerIdx = i + 1;

    // Entry drop animation — brush falls in from above for the first 20 frames
    if (gp.entryFrames > 0) {
      gp.entryFrames--;
      const t    = 1 - gp.entryFrames / 20;
      const ease = t * t * (3 - 2 * t);  // smoothstep
      gp.brush.ty = -3 + (gp.entryTarget + 3) * ease;
      return;
    }

    let spdN;
    if (gp.type === 'phone') {
      const s = phoneState[gp.id] || { tiltX: 0, tiltY: 0 };
      const a = ACCEL * cfg.accelMult;
      spdN = moveBrush(gp.brush, s.tiltX * a, s.tiltY * a, ownerIdx);
    } else {
      stepAI(gp, ownerIdx);
      spdN = Math.min(1, Math.hypot(gp.brush.vx, gp.brush.vy) / 0.12);
    }

    // Ink splat particles — rate proportional to speed
    if (Math.random() < 0.18 + spdN * 0.55) {
      spawnSplat(gp.brush.tx, gp.brush.ty, gp.color, spdN);
    }
  });

  tickFreshness();
  tickParticles();
  draw();
  updateHUD(remaining);
  if (remaining <= 0) { endGame(); return; }
  animId = requestAnimationFrame(gameLoop);
}

// ─── Game flow ────────────────────────────────────────────────────────────────
function startGame() {
  document.getElementById('ov-intro').style.display    = 'none';
  document.getElementById('countdown').style.display   = 'block';
  document.getElementById('timer-val').textContent     = cfg.gameSecs;

  // Colors for countdown: cycle through the about-to-play player colors
  const cdColors = [...selectedTokens].map((id, i) => PLAYER_COLORS[i % PLAYER_COLORS.length]);
  if (cdColors.length === 0) cdColors.push('var(--accent)');

  let count = 3;
  const cd = document.getElementById('countdown');
  cd.textContent = count;
  cd.style.color = cdColors[(3 - count) % cdColors.length];

  const iv = setInterval(() => {
    count--;
    if (count > 0) {
      cd.textContent = count;
      cd.style.color = cdColors[(3 - count) % cdColors.length];
    } else if (count === 0) {
      cd.textContent = 'GO!';
      cd.style.color = 'var(--green)';
    } else {
      clearInterval(iv);
      document.getElementById('overlay').classList.add('hidden');
      beginGame();
    }
  }, 900);
}

function buildHUDScores() {
  const scoresCont = document.getElementById('hud-scores');
  const barInner   = document.getElementById('score-bar-inner');
  if (!scoresCont || !barInner) return;
  scoresCont.innerHTML = '';
  barInner.innerHTML   = '';
  gamePlayers.forEach((gp, i) => {
    const s = document.createElement('span');
    s.style.color = gp.color;
    s.innerHTML = `${gp.label}: <strong id="hud-score-${i}">0%</strong>`;
    scoresCont.appendChild(s);
    const seg = document.createElement('div');
    seg.id = `bar-seg-${i}`;
    seg.className = 'score-seg';
    seg.style.cssText = `background:${gp.color};width:0%`;
    barInner.appendChild(seg);
  });
}

function beginGame() {
  resize();
  initGrid();
  particles.length = 0;
  playerRGBCache   = [];
  lastLeaderIdx    = -1;

  const tokens = [...selectedTokens];
  if (tokens.length === 0) tokens.push('ai');
  gamePlayers = tokens.map((id, i) => {
    const type        = id === 'ai' ? 'ai' : 'phone';
    const color       = PLAYER_COLORS[i % PLAYER_COLORS.length];
    const label       = id === 'ai' ? 'AI' : id;
    const start       = STARTS[i % STARTS.length];
    // Entry: start well above the arena, fall into position over 20 frames
    const brush       = makeBrush(start.col, -3);
    paintAt(brush.tx, start.row, BRUSH_R * 1.4, i + 1); // pre-stamp landing spot
    return { id, type, color, label, brush,
             entryFrames: 18 + i * 4,   // staggered drop
             entryTarget: start.row,
             aiTarget: { col: (COLS/2)|0, row: (ROWS/2)|0 },
             aiTimer: 30 + i * 10 };
  });
  buildHUDScores();
  gameRunning   = true;
  gameStartTime = performance.now();
  if (animId) cancelAnimationFrame(animId);
  musicPlay();
  animId = requestAnimationFrame(gameLoop);
}

function endGame() {
  gameRunning = false;
  musicStop();
  if (animId) cancelAnimationFrame(animId);
  draw();

  // Snapshot the final battlefield as blurred background of results overlay
  const snapshot = canvas.toDataURL('image/jpeg', 0.65);
  const rbg = document.getElementById('result-bg');
  if (rbg) {
    rbg.style.backgroundImage = `url(${snapshot})`;
    // Trigger reflow so transition fires
    void rbg.offsetWidth;
    rbg.style.opacity = '1';
  }
  const { counts, total } = getScores();
  // Rank players by score
  const ranked = gamePlayers
    .map((gp, i) => ({ gp, pct: counts[i] / total * 100 }))
    .sort((a, b) => b.pct - a.pct);
  const winner = ranked[0]?.gp;
  let winHtml;
  if (!winner)           winHtml = '\uD83C\uDFA8 Time\'s Up!';
  else if (gamePlayers.length === 1) winHtml = '\uD83C\uDFA8 Time\'s Up!';
  else if (winner.type === 'ai')     winHtml = '\uD83E\uDD16 AI Wins!';
  else                               winHtml = `\uD83C\uDF89 ${winner.label} Wins!`;
  // Build dynamic result scores
  const scoresEl = document.getElementById('ov-scores');
  scoresEl.innerHTML = '';
  ranked.forEach(({ gp, pct }, rank) => {
    const div = document.createElement('div');
    div.className = 'big-score';
    div.style.color = gp.color;
    const medal = rank === 0 ? '\uD83E\uDD47' : rank === 1 ? '\uD83E\uDD48' : rank === 2 ? '\uD83E\uDD49' : '';
    div.innerHTML = `<div>${pct.toFixed(1)}%</div><div class="lbl">${medal} ${gp.label}</div>`;
    scoresEl.appendChild(div);
  });
  scoresEl.style.display = 'flex';
  document.getElementById('overlay-h').innerHTML     = winHtml;
  document.getElementById('overlay-sub').textContent = ranked.map(({ gp, pct }) => `${gp.label} ${pct.toFixed(1)}%`).join('  \u00b7  ');
  document.getElementById('ov-result').style.display = 'flex';
  document.getElementById('countdown').style.display = 'none';
  document.getElementById('overlay').classList.remove('hidden');
}

function showLobby() {
  musicStop();
  // Reset result background
  const rbg = document.getElementById('result-bg');
  if (rbg) { rbg.style.opacity = '0'; rbg.style.backgroundImage = ''; }
  document.getElementById('ov-result').style.display = 'none';
  document.getElementById('ov-intro').style.display  = 'grid';
  document.getElementById('timer-val').textContent   = cfg.gameSecs;
  document.getElementById('overlay').classList.remove('hidden');
  updatePlayerRoster();
  const aiRow = document.getElementById('ai-diff-row');
  if (aiRow) aiRow.style.display = selectedTokens.has('ai') ? '' : 'none';
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
let ws;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws/laptop`);
  ws.onopen  = () => document.getElementById('ws-dot').classList.add('ok');
  ws.onclose = () => { document.getElementById('ws-dot').classList.remove('ok'); setTimeout(connectWS, 2000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'status') {
        // Full roster snapshot on WS connect, plus incremental updates
        if (Array.isArray(msg.players)) {
          msg.players.forEach(id => { connectedPlayers.add(id); });
          updatePlayerRoster();
        }
        if (msg.newPlayer)  { connectedPlayers.add(msg.newPlayer);    updatePlayerRoster(); }
        if (msg.leftPlayer) {
          connectedPlayers.delete(msg.leftPlayer);
          selectedTokens.delete(msg.leftPlayer);
          delete phoneState[msg.leftPlayer];
          updatePlayerRoster();
        }
        return;
      }
      if (msg.type !== 'motion') return;
      // Store tilt per phone — experiences route via slot assignments
      if (msg.playerId) {
        const gamma = msg.orientation?.gamma ?? 0;  // left/right  –90…90
        const beta  = msg.orientation?.beta  ?? 0;  // fwd/back  –180…180
        phoneState[msg.playerId] = {
          tiltX: Math.max(-1, Math.min(1, gamma / 45)),
          tiltY: Math.max(-1, Math.min(1, beta  / 45)),
        };
      }
    } catch { /* ignore */ }
  };
}

// ─── Init ─────────────────────────────────────────────────────────────────────
resize();
initGrid();
draw();
connectWS();
</script>
