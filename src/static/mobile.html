<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WavePad Controller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --green: #48bb78;
      --red:   #fc8181;
      --text:  #e2e8f0;
      --muted: #718096;
      --accent: #7c6af7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.6s;
    }

    /* ── Setup screen (pre-start) ──────────────────────────────────── */
    #setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
      padding: 32px 24px;
    }

    #status-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--red); display: inline-block;
      margin-right: 8px; vertical-align: middle;
      transition: background 0.3s;
    }
    #status-dot.ok { background: var(--green); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.38} }
    #status-text { font-size: 0.95rem; color: var(--muted); }

    #start-btn {
      background: var(--accent); color: #fff; border: none;
      border-radius: 50px; padding: 16px 44px;
      font-size: 1.05rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    #start-btn:active { transform: scale(0.96); }
    #start-btn:disabled { opacity: 0.35; cursor: default; }

    #error-box {
      background: rgba(252,129,129,0.1); border: 1px solid var(--red);
      border-radius: 10px; padding: 12px 18px; font-size: 0.82rem;
      color: var(--red); max-width: 320px; display: none; line-height: 1.5;
    }

    /* ── Full-screen ID view (after start) ─────────────────────────── */
    #id-screen {
      display: none;
      position: fixed; inset: 0;
      flex-direction: column;
      align-items: center; justify-content: center;
    }
    body.playing #id-screen { display: flex; }
    body.playing #setup      { display: none; }

    #pid-label {
      font-size: min(42vw, 42vh);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 6px 60px rgba(0,0,0,0.4);
    }
    #pid-sub {
      margin-top: 2.5vh;
      font-size: min(4.5vw, 4.5vh);
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
    }
    #pid-hint {
      position: fixed; bottom: 5vh;
      font-size: min(3vw, 3vh);
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>

  <div id="setup">
    <div>
      <span id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
    <button id="start-btn" disabled>Tap to Start</button>
    <div id="error-box"></div>
  </div>

  <div id="id-screen">
    <div id="pid-label">P?</div>
    <div id="pid-sub">Your ID</div>
    <div id="pid-hint">Keep this screen open &middot; hold flat &middot; tilt to play</div>
  </div>

<script>
  const statusDot  = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const startBtn   = document.getElementById('start-btn');
  const errorBox   = document.getElementById('error-box');

  let ws, sendInterval = null;
  let assignedColor = null;

  const PLAYER_COLORS = ['#7c6af7','#f56565','#4299e1','#48bb78','#ed8936','#9f7aea'];

  const sensorState = {
    acceleration: { x:0, y:0, z:0 },
    rotationRate: { alpha:0, beta:0, gamma:0 },
    orientation:  { alpha:0, beta:0, gamma:0 },
  };

  const host = location.host;

  function showError(msg) {
    errorBox.style.display = 'block';
    errorBox.textContent   = msg;
  }

  function applyAssignment(id) {
    const n = parseInt(id.slice(1)) || 1;
    assignedColor = PLAYER_COLORS[(n - 1) % PLAYER_COLORS.length];
    document.getElementById('pid-label').textContent = id;
  }

  function activateFullScreen() {
    if (!assignedColor) return;
    const r = parseInt(assignedColor.slice(1,3), 16);
    const g = parseInt(assignedColor.slice(3,5), 16);
    const b = parseInt(assignedColor.slice(5,7), 16);
    document.body.style.background =
      `rgb(${Math.round(r*0.22)},${Math.round(g*0.22)},${Math.round(b*0.22)})`;
    document.body.classList.add('playing');
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${host}/ws/mobile`);
    ws.onopen  = () => {
      statusDot.classList.add('ok');
      statusText.textContent = 'Connected — tap to start';
      startBtn.disabled = false;
    };
    ws.onclose = () => {
      statusDot.classList.remove('ok');
      statusText.textContent = 'Reconnecting…';
      startBtn.disabled = true;
      setTimeout(connect, 2000);
    };
    ws.onerror = () => ws.close();
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'assigned') applyAssignment(msg.playerId);
      } catch {}
    };
  }

  function startSendLoop() {
    sendInterval = setInterval(() => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'motion', ...sensorState }));
    }, 33);
    activateFullScreen();
  }

  function attachSensorListeners() {
    window.addEventListener('devicemotion', (e) => {
      const acc = e.acceleration || {}, rot = e.rotationRate || {};
      sensorState.acceleration = { x: acc.x??0, y: acc.y??0, z: acc.z??0 };
      sensorState.rotationRate = { alpha: rot.alpha??0, beta: rot.beta??0, gamma: rot.gamma??0 };
    });
    window.addEventListener('deviceorientation', (e) => {
      sensorState.orientation = { alpha: e.alpha??0, beta: e.beta??0, gamma: e.gamma??0 };
    });
  }

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;

    if (!window.isSecureContext) {
      showError('Open the https:// URL and accept the certificate warning first.');
      startBtn.disabled = false;
      return;
    }

    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      try {
        const result = await DeviceMotionEvent.requestPermission();
        if (result !== 'granted') {
          showError('Motion permission denied. Enable in Settings → Safari → Motion & Orientation Access.');
          startBtn.disabled = false;
          return;
        }
      } catch (err) {
        showError('Could not request motion permission: ' + err.message);
        startBtn.disabled = false;
        return;
      }
    } else if (typeof DeviceMotionEvent === 'undefined') {
      showError('DeviceMotion API unavailable on this browser.');
      startBtn.disabled = false;
      return;
    }

    attachSensorListeners();
    startSendLoop();
  });

  if (!window.isSecureContext) {
    showError('⚠️ Not secure (HTTP) — motion sensors blocked. Open the https:// URL.');
    startBtn.disabled = true;
  }

  connect();
</script>
</body>
</html>
